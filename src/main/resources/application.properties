spring.application.name=jwtToken15

spring.datasource.url=jdbc:mysql://localhost:3306/jwt
spring.datasource.username=root
spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver  --> no need of this coz of spring -
# initializer generate sql driver dependency

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret= ${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

spring.jpa.open-in-view=false
#Open-in-view can keep the persistence context available beyond the service layer and can allow lazy database -
#queries to happen while the response is being built.

